               "$url"; then
            
            # 检查文件是否为空
            if [ ! -s "$temp_file" ]; then
              echo "警告: $name 下载结果为空，跳过"
              rm -f "$temp_file"
              FAIL_COUNT=$((FAIL_COUNT + 1))
              continue
            fi
            
            # 检查是否为有效的 M3U 文件（包含 #EXTM3U 标记）
            if ! grep -q "^#EXTM3U" "$temp_file"; then
              echo "警告: $name 不是有效的 M3U 文件，跳过"
              rm -f "$temp_file"
