name: Auto Download & Sync IPTV

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:

env:
  TZ: Asia/Shanghai

jobs:
  download-and-sync:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        
    - name: Install tools
      run: |
        sudo apt-get update
        sudo apt-get install -y jq curl zip
        
    - name: Download M3U from sources.json
      run: |
        # 创建 IPTV_Nodes 目录（如果不存在）
        mkdir -p IPTV_Nodes
        
        echo "开始下载 M3U 文件..."
        echo "下载时间: $(date '+%Y-%m-%d %H:%M:%S')" > update_log.txt
        
        SUCCESS_COUNT=0
        FAIL_COUNT=0
        CHANGED_COUNT=0
        
        # 【关键修复】使用进程替换避免子 Shell 问题，确保变量在循环外保持
        while IFS= read -r source || [[ -n "$source" ]]; do
          # 跳过空行
          [ -z "$source" ] && continue
          
          name=$(echo "$source" | jq -r '.name // empty')
          url=$(echo "$source" | jq -r '.url // empty')
          
          # 检查 name 和 url 是否为空
          if [ -z "$name" ] || [ -z "$url" ]; then
            echo "警告: 检测到空条目，跳过 (name: ${name:-'空'}, url: ${url:-'空'})"
            FAIL_COUNT=$((FAIL_COUNT + 1))
            continue
          fi
          
          echo "下载: $name <- $url"
          
          # 下载临时文件
          temp_file="IPTV_Nodes/${name}.tmp"
          
          if curl -L --max-time 15 --retry 1 --retry-delay 3 \
               -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64)" \
               -o "$temp_file" \
               "$url" 2>/dev/null; then
            
            # 检查文件是否为空
            if [ ! -s "$temp_file" ]; then
              echo "警告: $name 下载结果为空，跳过"
              rm -f "$temp_file"
              FAIL_COUNT=$((FAIL_COUNT + 1))
              continue
            fi
            
            # 检查是否为有效的 M3U 文件（包含 #EXTM3U 标记）
            if ! head -n 5 "$temp_file" | grep -qi "#EXTM3U"; then
              echo "警告: $name 不是有效的 M3U 文件，跳过"
              rm -f "$temp_file"
              FAIL_COUNT=$((FAIL_COUNT + 1))
              continue
            fi
            
            # 比较文件内容
            if [ -f "IPTV_Nodes/$name" ]; then
              # 计算哈希值
              new_hash=$(sha256sum "$temp_file" | cut -d ' ' -f 1)
              old_hash=$(sha256sum "IPTV_Nodes/$name" | cut -d ' ' -f 1)
              
              if [ "$new_hash" != "$old_hash" ]; then
                # 文件有变化，更新
                mv "$temp_file" "IPTV_Nodes/$name"
                echo "成功: $name 有更新 ($(wc -c < IPTV_Nodes/$name) 字节)" | tee -a update_log.txt
                SUCCESS_COUNT=$((SUCCESS_COUNT + 1))
                CHANGED_COUNT=$((CHANGED_COUNT + 1))
              else
                # 文件无变化，保留原文件
                rm -f "$temp_file"
                echo "提示: $name 无变化，跳过更新"
                SUCCESS_COUNT=$((SUCCESS_COUNT + 1))
              fi
            else
              # 新文件，直接使用（包括被删除后重新下载的情况）
              mv "$temp_file" "IPTV_Nodes/$name"
              echo "成功: $name 新文件 ($(wc -c < IPTV_Nodes/$name) 字节)" | tee -a update_log.txt
              SUCCESS_COUNT=$((SUCCESS_COUNT + 1))
              CHANGED_COUNT=$((CHANGED_COUNT + 1))
            fi
          else
            echo "错误: $name 下载失败，保留原文件"
            rm -f "$temp_file"
            FAIL_COUNT=$((FAIL_COUNT + 1))
          fi
          
        done < <(jq -c '.sources[]' config/sources.json)
        echo "下载完成时间: $(date '+%Y-%m-%d %H:%M:%S')" | tee -a update_log.txt
        
        # 生成日志（此时变量值是正确的）
        echo "成功: $SUCCESS_COUNT, 失败: $FAIL_COUNT, 变化: $CHANGED_COUNT" | tee -a update_log.txt
        echo "" >> update_log.txt
        echo "文件列表:" >> update_log.txt
        ls -lh IPTV_Nodes/ | tee -a update_log.txt
        
        # 检查是否有变化或首次运行
        if [ $CHANGED_COUNT -gt 0 ]; then
          echo "检测到文件变化，准备更新"
          echo "CHANGED=true" >> $GITHUB_ENV
        elif [ ! -f "IPTV_Nodes/.gitkeep" ] && [ $SUCCESS_COUNT -gt 0 ]; then
          echo "首次运行或重建目录，准备提交"
          touch IPTV_Nodes/.gitkeep
          echo "CHANGED=true" >> $GITHUB_ENV
        else
          echo "无文件变化"
          echo "CHANGED=false" >> $GITHUB_ENV
        fi
        
    - name: Commit and push to GitHub (main)
      if: env.CHANGED == 'true'
      run: |
        git config user.email "action@github.com"
        git config user.name "GitHub Action"
        
        # 确保 IPTV_Nodes 目录在 Git 跟踪中
        if [ -f "IPTV_Nodes/.gitkeep" ]; then
          git add IPTV_Nodes/.gitkeep
        fi
        
        # 压缩 IPTV_Nodes 目录（排除 .gitkeep）
        rm -f IPTV_Nodes.zip
        zip -r IPTV_Nodes.zip IPTV_Nodes/ -x "*.gitkeep"
        
        # 添加所有变更
        git add IPTV_Nodes/ IPTV_Nodes.zip update_log.txt
        
        # 提交并推送
        git commit -m "Update: $(date '+%Y-%m-%d %H:%M:%S') (北京时间)" || echo "无变更需要提交"
        git push origin main
        
    - name: Push IPTV_Nodes to Gitee (force overwrite)
      if: env.CHANGED == 'true'
      env:
        GITEE_USER: ${{ secrets.GITEE_USER }}
        GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
        GITEE_REPO: ${{ secrets.GITEE_REPO }}
      run: |
        # 只推送 IPTV_Nodes/ 和 IPTV_Nodes.zip 到 Gitee
        mkdir -p /tmp/gitee-push
        cp -r IPTV_Nodes/ /tmp/gitee-push/
        cp IPTV_Nodes.zip /tmp/gitee-push/
        cp update_log.txt /tmp/gitee-push/
        
        cd /tmp/gitee-push
        
        git init
        git config user.email "action@github.com"
        git config user.name "GitHub Action"
        
        git remote add origin "https://${GITEE_USER}:${GITEE_TOKEN}@gitee.com/${GITEE_USER}/${GITEE_REPO}.git"
        
        git add .
        git commit -m "Update: $(date '+%Y-%m-%d %H:%M:%S') "
        
        git push origin master --force
        
        echo "已推送全新 IPTV_Nodes/ 和 IPTV_Nodes.zip 到 Gitee"

